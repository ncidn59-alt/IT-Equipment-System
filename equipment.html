<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Оборудование</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Список IT-оборудования</h1>
</header>

<nav>
    <a href="index.html">Главная</a>
    <a href="equipment.html">Оборудование</a>
    <a href="users.html">Пользователи</a>
    <a href="profile.html">Профиль</a>
    <a href="movement.html">Перемещения</a>
    <a href="reports.html">Отчеты</a>
    <a href="admin.html">Админ</a>
    <a href="repair.html">Ремонт</a>
</nav>

<div class="container">

    <div class="card">

        <h2>Добавить оборудование</h2>

        <input type="text"
        placeholder="Название оборудования"
        style="width:100%; padding:10px; margin-bottom:10px;">

        <input type="text"
        placeholder="Модель"
        style="width:100%; padding:10px; margin-bottom:10px;">

        <input type="text"
        placeholder="Серийный номер"
        style="width:100%; padding:10px; margin-bottom:10px;">

        <button onclick="addEquipment()">
            Сохранить оборудование
        </button>

    </div>

    <div class="card">

        <h2>Оборудование организации</h2>

        <input type="text"
        placeholder="Поиск оборудования..."
        style="width:100%; padding:10px; margin-bottom:20px;">

        <table width="100%" border="1" cellspacing="0" cellpadding="10">

            <tr>
                <th>№</th>
                <th>Название</th>
                <th>Модель</th>
                <th>Статус</th>
                <th>Действие</th>
            </tr>

            <tr>
                <td>1</td>
                <td>Ноутбук</td>
                <td>Lenovo ThinkPad</td>
                <td>Используется</td>

                <td>
                    <button onclick="deleteItem()">
                        Удалить
                    </button>
                </td>
            </tr>

            <tr>
                <td>2</td>
                <td>Принтер</td>
                <td>HP LaserJet</td>
                <td>На складе</td>

                <td>
                    <button onclick="deleteItem()">
                        Удалить
                    </button>
                </td>
            </tr>

            <tr>
                <td>3</td>
                <td>Маршрутизатор</td>
                <td>MikroTik</td>
                <td>Активен</td>

                <td>
                    <button onclick="deleteItem()">
                        Удалить
                    </button>
                </td>
            </tr>

        </table>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
